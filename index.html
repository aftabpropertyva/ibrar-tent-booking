<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ibrar Tent & Catering - Booking</title>
    
    <!-- Open Graph / Social Media Meta Tags -->
    <meta property="og:title" content="Ibrar Tent & Catering - Online Booking">
    <meta property="og:description" content="Professional tent and catering services. Book your equipment online easily via WhatsApp.">
    <meta property="og:image" content="thumbnail.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Ibrar Tent & Catering">
    <meta name="twitter:description" content="Professional tent and catering services. Book your equipment online easily via WhatsApp.">
    <meta name="twitter:image" content="thumbnail.jpg">

    <style>
        :root {
            --primary: #1a3a52;
            --accent: #d4af37;
            --secondary: #5a6c7d;
            --bg: #f5f7fa;
            --text: #1a1a1a;
            --white: #ffffff;
            --border: #e0e6ed;
            --success: #27ae60;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            line-height: 1.6;
        }

        .app-container {
            width: 100%;
            max-width: 480px;
            background: var(--white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
            padding-bottom: 200px;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }

        header {
            background: var(--white);
            position: sticky;
            top: 0;
            z-index: 10;
            border-bottom: 2px solid var(--accent);
        }

        .header-banner {
            width: 100%;
            height: 120px;
            background-image: url('banner.jpg');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        .header-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(26, 58, 82, 0.8));
            padding: 20px;
            color: white;
        }

        .header-content {
            padding: 12px 20px;
            text-align: center;
            background: linear-gradient(135deg, var(--primary) 0%, #2d5a7b 100%);
            color: white;
        }

        h1 {
            margin: 0;
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--accent);
        }

        .contact-info {
            font-size: 0.9rem;
            color: white;
            font-weight: 600;
            margin-top: 3px;
            display: block;
            text-decoration: none;
        }

        .section {
            padding: 20px;
            border-bottom: 1px solid var(--border);
        }

        .section-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--primary);
            margin-bottom: 15px;
            display: block;
            letter-spacing: 1px;
            border-left: 4px solid var(--accent);
            padding-left: 10px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            font-size: 0.9rem;
            margin-bottom: 6px;
            font-weight: 600;
            color: var(--primary);
        }

        input[type="text"], input[type="date"], textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            background: var(--white);
            transition: border-color 0.3s;
        }

        input[type="text"]:focus, input[type="date"]:focus, textarea:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
        }

        input[readonly] {
            background-color: #f1f3f5;
            color: var(--primary);
            font-weight: 600;
            cursor: default;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .items-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .item-card {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 14px;
            background: linear-gradient(135deg, #f8f9fa 0%, #f0f2f5 100%);
            border: 2px solid var(--border);
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .item-card:hover {
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(212, 175, 55, 0.15);
        }

        .item-info {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .item-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .item-name {
            font-weight: 600;
            color: var(--primary);
            font-size: 0.95rem;
        }

        .item-unit {
            font-size: 0.8rem;
            color: var(--secondary);
            margin-left: 4px;
        }

        .quantity-control {
            display: flex;
            align-items: center;
            gap: 8px;
            background: white;
            border: 2px solid var(--border);
            border-radius: 8px;
            padding: 4px;
        }

        .qty-btn {
            width: 36px;
            height: 36px;
            border: none;
            background: linear-gradient(135deg, var(--primary) 0%, #2d5a7b 100%);
            color: white;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .qty-btn:active {
            transform: scale(0.95);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);
        }

        .qty-input {
            width: 50px;
            text-align: center;
            border: none;
            font-size: 1rem;
            font-weight: bold;
            background: transparent;
            color: var(--primary);
        }

        input::-webkit-outer-spin-button,
        input::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .footer-actions {
            position: fixed;
            bottom: 0;
            width: 100%;
            max-width: 480px;
            background: linear-gradient(to top, var(--white), rgba(255,255,255,0.98));
            padding: 16px 20px;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 20;
            border-top: 2px solid var(--border);
        }

        .btn {
            width: 100%;
            height: 54px;
            border-radius: 10px;
            border: none;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--success) 0%, #229954 100%);
            color: white;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 0 0 rgba(39, 174, 96, 0.7);
            }
            50% {
                box-shadow: 0 0 0 10px rgba(39, 174, 96, 0);
            }
        }

        .btn-secondary {
            background: linear-gradient(135deg, var(--primary) 0%, #2d5a7b 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.15);
        }

        #toast {
            visibility: hidden;
            min-width: 200px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            text-align: center;
            border-radius: 10px;
            padding: 14px;
            position: fixed;
            z-index: 100;
            bottom: 220px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.95rem;
            font-weight: 600;
            box-shadow: 0 8px 16px rgba(0,0,0,0.2);
        }

        #toast.show {
            visibility: visible;
            animation: fadein 0.5s, fadeout 0.5s 2.5s;
        }

        @keyframes fadein { from {bottom: 190px; opacity: 0;} to {bottom: 220px; opacity: 1;} }
        @keyframes fadeout { from {bottom: 220px; opacity: 1;} to {bottom: 190px; opacity: 0;} }

        @media (max-width: 360px) {
            .item-card {
                padding: 12px;
            }
            
            .qty-btn {
                width: 32px;
                height: 32px;
                font-size: 1rem;
            }
            
            .qty-input {
                width: 45px;
            }
        }
    </style>
</head>
<body>

<div class="app-container">
    <header>
        <div class="header-banner">
            <div class="header-overlay">
                <div style="font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent);">Ibrar Tent & Catering</div>
            </div>
        </div>
        <div class="header-content">
            <h1>Ibrar Tent & Catering</h1>
            <a href="tel:+923469368255" class="contact-info">📞 +92 346 9368255</a>
        </div>
    </header>

    <!-- Customer Info Section -->
    <div class="section">
        <span class="section-title">Customer Details</span>
        <div class="form-group">
            <label for="customerName">Full Name</label>
            <input type="text" id="customerName" placeholder="Enter your name">
        </div>
        <div class="form-group">
            <label for="eventDate">Event Date</label>
            <input type="date" id="eventDate" onchange="updateDayName()">
        </div>
        <div class="form-group">
            <label for="dayNameInput">Day Name</label>
            <input type="text" id="dayNameInput" placeholder="Select a date first" readonly>
        </div>
    </div>

    <!-- Equipment Section -->
    <div class="section">
        <span class="section-title">Equipment Selection</span>
        <div class="items-grid" id="itemList">
            <!-- Items will be injected here -->
        </div>
    </div>

    <!-- Other Items Section -->
    <div class="section">
        <span class="section-title">Additional Requirements</span>
        <div class="form-group">
            <label for="otherDetails">Other Items / Special Requests</label>
            <textarea id="otherDetails" placeholder="Any other items or details..."></textarea>
        </div>
    </div>

    <div class="footer-actions">
        <button class="btn btn-primary" onclick="sendToWhatsApp()">📲 Send to WhatsApp</button>
        <button class="btn btn-secondary" onclick="resetAll()">🔄 Reset All</button>
    </div>
</div>

<div id="toast">✅ Opening WhatsApp...</div>

<script>
    const items = [
        { name: "Chairs", icon: "🪑", unit: "" },
        { name: "VIP Chairs", icon: "👑", unit: "" },
        { name: "Tables", icon: "🪑", unit: "" },
        { name: "VIP Table", icon: "👑", unit: "" },
        { name: "Trays", icon: "🍽️", unit: "" },
        { name: "Plates", icon: "🍴", unit: "" },
        { name: "Jeg (Water Jug)", icon: "🫖", unit: "" },
        { name: "Glass", icon: "🥤", unit: "" },
        { name: "Qanat (Large Tent)", icon: "⛺", unit: "" },
        { name: "Chatri (Small Canopy)", icon: "☂️", unit: "" },
        { name: "Large Chatri", icon: "☂️", unit: "" },
        { name: "Cooler", icon: "❄️", unit: "" },
        { name: "Khashak (Wood)", icon: "🪵", unit: "Ton" },
        { name: "Qaleen", icon: "🧵", unit: "" },
        { name: "Stage", icon: "🎭", unit: "" },
        { name: "Anghari", icon: "🪜", unit: "" },
        { name: "Tab", icon: "🔊", unit: "" },
        { name: "Khanak", icon: "🔗", unit: "" },
        { name: "Patela", icon: "🍳", unit: "" },
        { name: "Sandoq", icon: "📦", unit: "" }
    ];

    const itemListContainer = document.getElementById('itemList');

    // Initialize items
    items.forEach((item, index) => {
        const card = document.createElement('div');
        card.className = 'item-card';
        card.innerHTML = `
            <div class="item-info">
                <div class="item-icon">${item.icon}</div>
                <div>
                    <span class="item-name">${item.name}</span>
                    ${item.unit ? `<span class="item-unit">(${item.unit})</span>` : ''}
                </div>
            </div>
            <div class="quantity-control">
                <button class="qty-btn" onclick="updateQty(${index}, -1)">−</button>
                <input type="number" id="qty-${index}" class="qty-input" value="0" min="0">
                <button class="qty-btn" onclick="updateQty(${index}, 1)">+</button>
            </div>
        `;
        itemListContainer.appendChild(card);
    });

    function updateDayName() {
        const dateInput = document.getElementById('eventDate');
        const dayNameInput = document.getElementById('dayNameInput');
        
        if (dateInput.value) {
            const date = new Date(dateInput.value);
            const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
            const dayName = days[date.getDay()];
            dayNameInput.value = dayName;
        } else {
            dayNameInput.value = '';
        }
    }

    function updateQty(index, change) {
        const input = document.getElementById(`qty-${index}`);
        let val = parseInt(input.value) + change;
        if (val < 0) val = 0;
        input.value = val;
    }

    function resetAll() {
        if (confirm("Are you sure you want to reset all fields?")) {
            document.getElementById('customerName').value = '';
            document.getElementById('eventDate').value = '';
            document.getElementById('dayNameInput').value = '';
            document.getElementById('otherDetails').value = '';
            items.forEach((_, index) => {
                document.getElementById(`qty-${index}`).value = 0;
            });
        }
    }

    function showToast() {
        const toast = document.getElementById("toast");
        toast.className = "show";
        setTimeout(() => { toast.className = toast.className.replace("show", ""); }, 3000);
    }

    function sendToWhatsApp() {
        const name = document.getElementById('customerName').value.trim();
        const date = document.getElementById('eventDate').value;
        const dayName = document.getElementById('dayNameInput').value;
        const other = document.getElementById('otherDetails').value.trim();
        
        let message = "Assalam u Alaikum! I want to book equipment:\n\n";
        
        if (name) message += `*Name:* ${name}\n`;
        if (date) {
            message += `*Event Date:* ${date} (${dayName})\n\n`;
        }
        
        let hasItems = false;
        items.forEach((item, index) => {
            const qty = parseInt(document.getElementById(`qty-${index}`).value);
            if (qty > 0) {
                const unit = item.unit ? ` ${item.unit}` : '';
                message += `- ${item.name}: ${qty}${unit}\n`;
                hasItems = true;
            }
        });

        if (other) {
            message += `\n*Other Requirements:*\n${other}\n`;
            hasItems = true;
        }

        if (!hasItems) {
            alert("Please select at least 1 item or provide details.");
            return;
        }

        message += "\nPlease confirm availability & pricing. JazakAllah!";
        
        const encodedMessage = encodeURIComponent(message);
        const whatsappUrl = `https://wa.me/923469368255?text=${encodedMessage}`;
        
        showToast();
        
        setTimeout(() => {
            window.location.href = whatsappUrl;
        }, 800);
    }
</script>

</body>
</html>
